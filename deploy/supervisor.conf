[program:sma-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/sma/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/sma-worker.log
stopwaitsecs=3600

[program:sma-scheduler]
process_name=%(program_name)s
command=/bin/bash -c "while true; do php /var/www/sma/artisan schedule:run >> /var/log/sma-scheduler.log 2>&1; sleep 60; done"
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/sma-scheduler.log
